listen=YES
listen_ipv6=NO
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# User permissions and chroot
chroot_local_user=YES
allow_writeable_chroot=YES
seccomp_sandbox=NO

# Set the starting directory for FTP users
local_root=/var/www/html

# Passive mode configuration
pasv_enable=YES
pasv_address=127.0.0.1
pasv_min_port=40000
pasv_max_port=40005

# Secure empty directory
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd

# Limit to explicit users only
userlist_enable=YES
userlist_file=/etc/vsftpd.userlist
userlist_deny=NO
